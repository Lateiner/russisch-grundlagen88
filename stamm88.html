<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Grammatik: Zahlen-Stammbaum</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #1e293b;
            --nom-color: #8b5cf6;
            --gen-sg-color: #f59e0b;
            --gen-pl-color: #ec4899;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .instruction { color: #64748b; margin-bottom: 2rem; }

        /* Number Pool */
        .number-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2.5rem;
            padding: 20px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 15px;
        }

        .num-card {
            background: white;
            border: 2px solid var(--primary);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            min-width: 45px;
        }

        .num-card.selected {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .num-card.hidden {
            display: none;
        }

        /* The Tree / Categories */
        .tree-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .tree-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .rule-bucket {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .rule-bucket:hover {
            border-color: var(--primary);
        }

        .rule-bucket h3 {
            margin-top: 0;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .rule-bucket .rule-desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 15px;
            pointer-events: none;
        }

        .bucket-nom { border-top: 6px solid var(--nom-color); }
        .bucket-gen-sg { border-top: 6px solid var(--gen-sg-color); }
        .bucket-gen-pl { border-top: 6px solid var(--gen-pl-color); }

        .assigned-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }

        .assigned-tag {
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #e2e8f0;
        }

        /* Feedback */
        .feedback { min-height: 50px; margin: 20px 0; font-weight: bold; line-height: 1.4; }
        .btn-restart {
            background: var(--text);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Stammbaum-Vervollständigung</h1>
    <p class="instruction">Ordne die 10 Zahlen der richtigen grammatikalischen Regel zu.</p>

    <div class="number-pool" id="pool">
        <!-- Zahlen werden hier generiert -->
    </div>

    <div class="tree-grid">
        <!-- Regel 1 -->
        <div class="rule-bucket bucket-nom" onclick="dropToBucket('nom')">
            <h3 style="color:var(--nom-color)">Nominativ Singular</h3>
            <span class="rule-desc">Endung auf 1 (außer 11)</span>
            <div class="assigned-numbers" id="bucket-nom"></div>
        </div>

        <!-- Regel 2-4 -->
        <div class="rule-bucket bucket-gen-sg" onclick="dropToBucket('gen-sg')">
            <h3 style="color:var(--gen-sg-color)">Genitiv Singular</h3>
            <span class="rule-desc">Endung auf 2, 3, 4 (außer 12-14)</span>
            <div class="assigned-numbers" id="bucket-gen-sg"></div>
        </div>

        <!-- Regel 5-0 -->
        <div class="rule-bucket bucket-gen-pl" onclick="dropToBucket('gen-pl')">
            <h3 style="color:var(--gen-pl-color)">Genitiv Plural</h3>
            <span class="rule-desc">5–20, volle Zehner, 11–14</span>
            <div class="assigned-numbers" id="bucket-gen-pl"></div>
        </div>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="btn-restart" id="btn-restart" onclick="location.reload()">Neustart</button>
</div>

<script>
    const numbersData = [
        { val: "1", cat: "nom" },
        { id: "2", val: "2", cat: "gen-sg" },
        { id: "3", val: "3", cat: "gen-sg" },
        { id: "4", val: "4", cat: "gen-sg" },
        { id: "5", val: "5", cat: "gen-pl" },
        { id: "11", val: "11", cat: "gen-pl" }, // Stolperfalle
        { id: "14", val: "14", cat: "gen-pl" }, // Stolperfalle
        { id: "21", val: "21", cat: "nom" },
        { id: "22", val: "22", cat: "gen-sg" },
        { id: "30", val: "30", cat: "gen-pl" }
    ];

    let currentSelected = null;
    let solvedCount = 0;

    function initPool() {
        const pool = document.getElementById('pool');
        const shuffled = [...numbersData].sort(() => Math.random() - 0.5);
        
        shuffled.forEach((num, index) => {
            const div = document.createElement('div');
            div.className = 'num-card';
            div.innerText = num.val;
            div.onclick = (e) => selectNumber(num, div, e);
            pool.appendChild(div);
        });
    }

    function selectNumber(data, element, event) {
        event.stopPropagation();
        document.querySelectorAll('.num-card').forEach(c => c.classList.remove('selected'));
        currentSelected = { data, element };
        element.classList.add('selected');
        document.getElementById('feedback').innerText = `Wohin gehört die Zahl ${data.val}?`;
        document.getElementById('feedback').style.color = "var(--text)";
    }

    function dropToBucket(category) {
        if (!currentSelected) {
            document.getElementById('feedback').innerText = "Wähle zuerst oben eine Zahl aus!";
            return;
        }

        const { data, element } = currentSelected;

        if (data.cat === category) {
            // Richtig
            const tag = document.createElement('div');
            tag.className = 'assigned-tag';
            tag.innerText = data.val;
            document.getElementById(`bucket-${category}`).appendChild(tag);
            
            element.classList.add('hidden');
            document.getElementById('feedback').innerText = `Richtig! ${data.val} wurde zugeordnet.`;
            document.getElementById('feedback').style.color = "var(--success)";
            
            currentSelected = null;
            solvedCount++;

            if (solvedCount === numbersData.length) {
                document.getElementById('feedback').innerHTML = "Hervorragend! Du hast alle Zahlen korrekt nach den Regeln des Stammbaums sortiert.";
                document.getElementById('btn-restart').style.display = "block";
            }
        } else {
            // Falsch
            document.getElementById('feedback').innerText = `Nein, ${data.val} folgt einer anderen Regel. Überlege noch einmal!`;
            document.getElementById('feedback').style.color = "var(--error)";
            element.classList.remove('selected');
            currentSelected = null;
        }
    }

    initPool();
</script>

</body>
</html>
