<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Memory: 10 Paare</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-back: #2c3e50;
            --card-front: #ffffff;
            --text-color: #34495e;
            --accent: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .stats {
            margin: 10px 0;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--card-back);
        }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 800px;
        }

        @media (min-width: 600px) {
            .memory-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* Karten-Styling */
        .memory-card {
            aspect-ratio: 1 / 1;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            transition: opacity 0.5s, transform 0.5s;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 6px;
        }

        .memory-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            padding: 5px;
            box-sizing: border-box;
            font-weight: bold;
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 1.5rem;
        }

        .card-front {
            background-color: var(--card-front);
            color: var(--text-color);
            transform: rotateY(180deg);
            border: 2px solid #ddd;
            font-size: 0.8rem;
            line-height: 1.2;
        }

        .card-front.number-card {
            font-size: 1.8rem;
            color: var(--accent);
        }

        /* Verschwinden-Effekt */
        .memory-card.matched {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5);
        }

        /* Steuerungsbereich */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: white;
        }

        .btn-restart { background-color: var(--card-back); }
        .btn-solution { background-color: #8e44ad; }

        @media (max-width: 400px) {
            .card-front { font-size: 0.7rem; }
            .card-front.number-card { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="stats" id="stats">Paare: 0 / 10</div>

    <div class="memory-grid" id="grid"></div>

    <div class="controls">
        <button class="btn btn-restart" onclick="location.reload()">Neustart</button>
        <button class="btn btn-solution" onclick="showSolution()">Lösung anzeigen</button>
    </div>

<script>
    const pairs = [
        { id: 1, val: "1", type: "num", color: "#e74c3c" },
        { id: 1, val: "один хороший друг", type: "phrase", color: "#e74c3c" },
        
        { id: 2, val: "2", type: "num", color: "#3498db" },
        { id: 2, val: "два новых дома", type: "phrase", color: "#3498db" },
        
        { id: 3, val: "2 (жен. род)", type: "num", color: "#2ecc71" },
        { id: 3, val: "две интересne книги", type: "phrase", color: "#2ecc71" },
        
        { id: 4, val: "2 (ср. род)", type: "num", color: "#f1c40f" },
        { id: 4, val: "два полезных слова", type: "phrase", color: "#f1c40f" },
        
        { id: 5, val: "3", type: "num", color: "#9b59b6" },
        { id: 5, val: "три лучшие подруги", type: "phrase", color: "#9b59b6" },
        
        { id: 6, val: "5", type: "num", color: "#1abc9c" },
        { id: 6, val: "пять больших музеев", type: "phrase", color: "#1abc9c" },
        
        { id: 7, val: "11", type: "num", color: "#e67e22" },
        { id: 7, val: "одиннадцать широких улиц", type: "phrase", color: "#e67e22" },
        
        { id: 8, val: "21", type: "num", color: "#34495e" },
        { id: 8, val: "двадцать один новый дом", type: "phrase", color: "#34495e" },
        
        { id: 9, val: "4", type: "num", color: "#d35400" },
        { id: 9, val: "четыре длинные статьи", type: "phrase", color: "#d35400" },
        
        { id: 10, val: "1 (ср. род)", type: "num", color: "#7f8c8d" },
        { id: 10, val: "одно интересное задание", type: "phrase", color: "#7f8c8d" }
    ];

    let flippedCards = [];
    let matchedCount = 0;
    let lockBoard = false;
    let isSolutionMode = false;

    function init() {
        const grid = document.getElementById('grid');
        const shuffled = [...pairs].sort(() => Math.random() - 0.5);
        grid.innerHTML = "";

        shuffled.forEach(data => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = data.id;
            card.dataset.color = data.color;

            const isNumber = data.type === 'num';
            
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back">?</div>
                    <div class="card-front ${isNumber ? 'number-card' : ''}">
                        ${data.val}
                    </div>
                </div>
            `;

            card.addEventListener('click', () => flipCard(card));
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (lockBoard || isSolutionMode || card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        lockBoard = true;
        const [c1, c2] = flippedCards;

        if (c1.dataset.id === c2.dataset.id) {
            matchedCount++;
            document.getElementById('stats').innerText = `Paare: ${matchedCount} / 10`;
            setTimeout(() => {
                c1.classList.add('matched');
                c2.classList.add('matched');
                flippedCards = [];
                lockBoard = false;
            }, 600);
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                flippedCards = [];
                lockBoard = false;
            }, 1000);
        }
    }

    function showSolution() {
        if (isSolutionMode) return;
        isSolutionMode = true;
        const allCards = document.querySelectorAll('.memory-card');
        
        allCards.forEach(card => {
            card.classList.remove('matched');
            card.style.opacity = "1";
            card.classList.add('flipped');
            const front = card.querySelector('.card-front');
            front.style.border = `4px solid ${card.dataset.color}`;
            front.style.backgroundColor = card.dataset.color + "22"; // Transparente Farbe
        });
    }

    init();
</script>

</body>
</html>
